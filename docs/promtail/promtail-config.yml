server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: netrollout-rollout-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: netrollout
          __path__: /logs/*.log
    pipeline_stages:
      - regex:
          source: filename
          expression: '(?P<prefix>[a-z_]+)_(?P<ts>[\d_]+)_(?P<job_id>[a-f0-9-]+)\.log$'
      - labels:
          job_id:
          prefix:
      - regex:
          expression: '^\S+\s+(?P<log_time>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2})'
      - timestamp:
          source: log_time
          format: '2006-01-02 15:04:05'
