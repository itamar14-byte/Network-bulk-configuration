<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Upload Configuration</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
  <div class="container">
    <h2 class="mb-4">⚙️ Configuration Rollout Setup</h2>

    <!-- Accordion -->
    <div class="accordion" id="setupAccordion">

      <!-- Devices Section -->
      <div class="accordion-item">
        <h2 class="accordion-header" id="headingDevices">
          <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapseDevices">
            Devices
          </button>
        </h2>
        <div id="collapseDevices" class="accordion-collapse collapse show" data-bs-parent="#setupAccordion">
          <div class="accordion-body">
            <form method="post" action="/upload_devices" enctype="multipart/form-data">
              <label class="form-label">Upload Devices CSV</label>
              <input class="form-control mb-3" type="file" name="device_file" accept=".csv">
              <button class="btn btn-primary" type="submit">Upload CSV</button>
            </form>
            <hr>
            <p>Or add devices manually:</p>
            <button class="btn btn-secondary">➕ Add Device</button>
            <div id="deviceList" class="mt-3"></div>
          </div>
        </div>
      </div>

      <!-- Commands Section -->
      <div class="accordion-item">
        <h2 class="accordion-header" id="headingCommands">
          <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseCommands">
            Commands
          </button>
        </h2>
        <div id="collapseCommands" class="accordion-collapse collapse" data-bs-parent="#setupAccordion">
          <div class="accordion-body">
            <form method="post" action="/upload_commands" enctype="multipart/form-data">
              <label class="form-label">Upload Commands TXT</label>
              <input class="form-control mb-3" type="file" name="commands_file" accept=".txt">
              <button class="btn btn-primary" type="submit">Upload TXT</button>
            </form>
            <hr>
            <label class="form-label">Or type commands manually</label>
            <textarea class="form-control" rows="5" placeholder="Enter one command per line"></textarea>
          </div>
        </div>
      </div>

      <!-- General Options -->
      <div class="accordion-item">
        <h2 class="accordion-header" id="headingOptions">
          <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseOptions">
            General Options
          </button>
        </h2>
        <div id="collapseOptions" class="accordion-collapse collapse" data-bs-parent="#setupAccordion">
          <div class="accordion-body">
            <form method="post" action="/start_rollout">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="verbose" id="verbose">
                <label class="form-check-label" for="verbose">Verbose Output</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="verify" id="verify">
                <label class="form-check-label" for="verify">Verify Configuration</label>
              </div>
              <button class="btn btn-success mt-3" type="submit">🚀 Start Rollout</button>
            </form>
          </div>
        </div>
      </div>
    </div>

  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
