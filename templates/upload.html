{% extends "base.html" %}
{% block title %}Upload Configuration - Network Rollout Tool{% endblock %}

{% block content %}
<h2 class="mb-4">⚙️ Configuration Rollout Setup</h2>

<form method="post" action="/start_rollout" enctype="multipart/form-data">
    <div class="accordion" id="setupAccordion">

        <!-- Devices Section -->
        <div class="accordion-item">
            <h2 class="accordion-header" id="headingDevices">
                <button class="accordion-button" type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#collapseDevices">
                    Devices
                </button>
            </h2>
            <div id="collapseDevices" class="accordion-collapse collapse show"
                 data-bs-parent="#setupAccordion">
                <div class="accordion-body">
                    <label class="form-label">Upload Devices CSV</label>
                    <input id="deviceFileInput" class="form-control mb-3"
                           type="file" name="device_file" accept=".csv">
                    <button class="btn btn-primary" type="button"
                            onclick="document.getElementById('deviceFileInput').click()">
                        Upload CSV
                    </button>
                    <small id="deviceFileName"
                           class="text-muted d-block mt-2"></small>

                    <script>
                        const input = document.getElementById("deviceFileInput");
                        const fileNameDisplay = document.getElementById("deviceFileName");
                        input.addEventListener("change", (event) => {
                            const file = event.target.files[0];
                            fileNameDisplay.textContent = file ? "Selected: " + file.name : "";
                        });
                    </script>

                    <hr>
                    <p>Or add devices manually:</p>
                    <button class="btn btn-secondary" type="button"
                            data-bs-toggle="modal"
                            data-bs-target="#deviceModal">
                        ➕ Add Device
                    </button>

                    <!-- Modal -->
                    <div class="modal fade" id="deviceModal" tabindex="-1"
                         aria-labelledby="deviceModalLabel" aria-hidden="true">
                        <div class="modal-dialog">
                            <div class="modal-content">
                                <div class="modal-header">
                                    <h5 class="modal-title"
                                        id="deviceModalLabel">Add Device</h5>
                                    <button type="button" class="btn-close"
                                            data-bs-dismiss="modal"
                                            aria-label="Close"></button>
                                </div>
                                <div class="modal-body">
                                    <div id="deviceForm">
                                        <input class="form-control mb-2"
                                               name="ip"
                                               placeholder="IP Address"
                                               required>
                                        <input class="form-control mb-2"
                                               name="username"
                                               placeholder="Username" required>

                                        <!-- Password with toggle -->
                                        <div class="input-group mb-2">
                                            <input class="form-control"
                                                   name="password"
                                                   placeholder="Password"
                                                   type="password" required>
                                            <button class="btn btn-outline-secondary toggle-password"
                                                    type="button">👁
                                            </button>
                                        </div>

                                        <select class="form-control mb-2 selectpicker"
                                                name="platform"
                                                data-live-search="true"
                                                required>
                                            <option value="" disabled selected>
                                                Select Platform
                                            </option>
                                            <option value="fortinet">Fortinet
                                                FortiOS(Fortigate)
                                            </option>
                                            <option value="paloalto_panos">Palo
                                                Alto PAN-OS
                                            </option>
                                            <option value="cisco_ios">Cisco
                                                IOS
                                            </option>
                                            <option value="cisco_nxos">Cisco
                                                Nexus
                                            </option>
                                            <option value="cisco_xe">Cisco
                                                IOS-XE
                                            </option>
                                            <option value="cisco_xr">Cisco
                                                IOS-XR
                                            </option>
                                            <option value="juniper_junos">
                                                Juniper Junos
                                            </option>
                                            <option value="arista_eos">Arista
                                                EOS
                                            </option>
                                            <option value="aruba_aoscx">Aruba
                                                AOS-CX
                                            </option>
                                            <option value="checkpoint_gaia">
                                                Checkpoint GAiA
                                            </option>
                                            <option value="hp_procurve">HP
                                                ProCurve
                                            </option>
                                            <option value="hp_comware">HP
                                                Comware
                                            </option>
                                        </select>

                                        <!-- Secret with toggle -->
                                        <div class="input-group mb-2">
                                            <input class="form-control"
                                                   name="secret"
                                                   placeholder="Secret"
                                                   type="password">
                                            <button class="btn btn-outline-secondary toggle-password"
                                                    type="button">👁
                                            </button>
                                        </div>

                                        <input class="form-control mb-2"
                                               name="port" placeholder="Port"
                                               type="number" value="22"
                                               required>
                                    </div>
                                    <div id="deviceError"
                                         class="text-danger"></div>
                                </div>
                                <div class="modal-footer">
                                    <button class="btn btn-primary"
                                            type="button" id="saveDeviceBtn">
                                        Save Device
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Device Table -->
                    <div id="deviceList" class="mt-3">
                        <table class="table table-striped" id="deviceTable">
                            <thead>
                            <tr>
                                <th>IP</th>
                                <th>Username</th>
                                <th>Platform</th>
                                <th>Port</th>
                                <th>Action</th>
                            </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>

                    <script>
                        document.addEventListener("DOMContentLoaded", function () {
                            $('.selectpicker').selectpicker();

                            $('#deviceModal').on('shown.bs.modal', function () {
                                $('.selectpicker').selectpicker('render');
                            });

                            // 👁 toggle logic
                            document.querySelectorAll(".toggle-password").forEach(btn => {
                                btn.addEventListener("click", function () {
                                    const input = this.previousElementSibling;
                                    if (input.type === "password") {
                                        input.type = "text";
                                        this.textContent = "🙈";
                                    } else {
                                        input.type = "password";
                                        this.textContent = "👁";
                                    }
                                });
                            });

                            document.getElementById("saveDeviceBtn").addEventListener("click", function () {
                                const form = document.getElementById("deviceForm");

                                const ip = form.querySelector("[name='ip']").value;
                                const username = form.querySelector("[name='username']").value;
                                const platformSelect = form.querySelector("[name='platform']");
                                const platformValue = platformSelect.value;
                                const platformLabel = platformSelect.options[platformSelect.selectedIndex].text; // ✅ show label
                                const port = form.querySelector("[name='port']").value;

                                if (!ip || !username || !platformValue || !port) {
                                    document.getElementById("deviceError").textContent = "All fields are required.";
                                    return;
                                }

                                // Add row with the human-readable platform
                                const tableBody = document.querySelector("#deviceTable tbody");
                                const row = document.createElement("tr");
                                row.innerHTML = `
        <td>${ip}</td>
        <td>${username}</td>
        <td>${platformLabel}</td> <!-- ✅ use label -->
        <td>${port}</td>
        <td><button class="btn btn-sm btn-danger delete-btn">Delete</button></td>
    `;
                                tableBody.appendChild(row);

                                // Delete event
                                row.querySelector(".delete-btn").addEventListener("click", function () {
                                    row.remove();
                                });

                                // Reset inputs (but keep port = 22)
                                form.querySelectorAll("input").forEach(el => {
                                    if (el.name === "port") {
                                        el.value = "22";  // ✅ reset to default
                                    } else {
                                        el.value = "";
                                    }
                                });

                                // Reset dropdown
                                platformSelect.value = "";
                                $('.selectpicker').selectpicker('val', '');

                                document.getElementById("deviceError").textContent = "";

                                // Close modal
                                const modal = bootstrap.Modal.getInstance(document.getElementById("deviceModal"));
                                modal.hide();
                            });

                        });
                    </script>
                </div>
            </div>
        </div> <!-- ✅ close Devices -->

        <!-- Commands Section -->
        <div class="accordion-item">
            <h2 class="accordion-header" id="headingCommands">
                <button class="accordion-button collapsed" type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#collapseCommands">
                    Commands
                </button>
            </h2>
            <div id="collapseCommands" class="accordion-collapse collapse"
                 data-bs-parent="#setupAccordion">
                <div class="accordion-body">

                    <label class="form-label">Upload Commands TXT</label>
                    <div class="input-group mb-3">
                        <!-- Visible file input -->
                        <input id="commandsFileInput" class="form-control"
                               type="file" name="commands_file" accept=".txt">
                        <button id="commandsClearBtn"
                                class="btn btn-outline-danger" type="button"
                                style="display: none;">
                            ❌
                        </button>
                    </div>

                    <hr>
                    <label class="form-label">Or type commands manually</label>
                    <textarea id="manualCommands" class="form-control"
                              name="manual_commands" rows="5"
                              placeholder="Enter one command per line"></textarea>
                </div>
            </div>
        </div>

        <script>
            const commandsInput = document.getElementById("commandsFileInput");
            const commandsClearBtn = document.getElementById("commandsClearBtn");
            const manualCommands = document.getElementById("manualCommands");

            function resetCommandsState() {
                commandsInput.value = "";
                commandsClearBtn.style.display = "none";
                manualCommands.disabled = false;
                commandsInput.disabled = false;
            }

            // When a file is chosen, disable textarea and show X button
            commandsInput.addEventListener("change", (event) => {
                const file = event.target.files[0];
                if (file) {
                    manualCommands.disabled = true;
                    commandsClearBtn.style.display = "inline-block";
                } else {
                    resetCommandsState();
                }
            });

            // Clear file when ❌ clicked
            commandsClearBtn.addEventListener("click", () => {
                resetCommandsState();
            });

            // When textarea is typed into, disable upload
            manualCommands.addEventListener("input", () => {
                if (manualCommands.value.trim().length > 0) {
                    commandsInput.disabled = true;
                } else {
                    commandsInput.disabled = false;
                }
            });
        </script>


        <!-- General Options -->
        <div class="accordion-item">
            <h2 class="accordion-header" id="headingOptions">
                <button class="accordion-button collapsed" type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#collapseOptions">
                    General Options
                </button>
            </h2>
            <div id="collapseOptions" class="accordion-collapse collapse"
                 data-bs-parent="#setupAccordion">
                <div class="accordion-body">
                    <div class="form-check d-flex justify-content-center align-items-center mb-2">
                        <input class="form-check-input me-2" type="checkbox"
                               name="verbose" id="verbose">
                        <label class="form-check-label" for="verbose">Verbose
                            Output</label>
                    </div>
                    <div class="form-check d-flex justify-content-center align-items-center mb-2">
                        <input class="form-check-input me-2" type="checkbox"
                               name="verify" id="verify">
                        <label class="form-check-label" for="verify">Verify
                            Configuration</label>
                    </div>
                </div>
            </div>
        </div> <!-- ✅ close Options -->

    </div> <!-- ✅ close accordion -->

    <!-- Submit button -->
    <div class="d-flex justify-content-center mt-4">
        <button class="btn btn-success" type="submit">🚀 Start Rollout</button>
    </div>
</form>
{% endblock %}
