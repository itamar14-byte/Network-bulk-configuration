{% extends "base.html" %}
{% block title %}Upload Configuration - Network Rollout Tool{% endblock %}

{% block content %}
<h2 class="mb-4">⚙️ Configuration Rollout Setup</h2>

<!-- One single form -->
<form method="post" action="/start_rollout" enctype="multipart/form-data">

  <div class="accordion" id="setupAccordion">

    <!-- Devices Section -->
    <div class="accordion-item">
      <h2 class="accordion-header" id="headingDevices">
        <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapseDevices">
          Devices
        </button>
      </h2>
      <div id="collapseDevices" class="accordion-collapse collapse show" data-bs-parent="#setupAccordion">
        <div class="accordion-body">
          <label class="form-label">Upload Devices CSV</label>

          <!-- File input with Bootstrap styling -->
          <input id="deviceFileInput" class="form-control mb-3" type="file" name="device_file" accept=".csv">

          <!-- Custom upload button -->
          <button class="btn btn-primary" type="button" onclick="document.getElementById('deviceFileInput').click()">
            Upload CSV
          </button>

          <!-- File name display -->
          <small id="deviceFileName" class="text-muted d-block mt-2"></small>

          <script>
            const input = document.getElementById("deviceFileInput");
            const fileNameDisplay = document.getElementById("deviceFileName");

            input.addEventListener("change", (event) => {
              const file = event.target.files[0];
              if (file) {
                fileNameDisplay.textContent = "Selected: " + file.name;
              } else {
                fileNameDisplay.textContent = "";
              }
            });
          </script>
          <hr>
          <p>Or add devices manually:</p>
          <!-- Add Device Button (opens modal) -->
          <button class="btn btn-secondary" type="button" data-bs-toggle="modal" data-bs-target="#deviceModal">
            ➕ Add Device
          </button>

          <!-- Modal definition -->
          <div class="modal fade" id="deviceModal" tabindex="-1" aria-labelledby="deviceModalLabel"
               aria-hidden="true">
            <div class="modal-dialog">
              <div class="modal-content">
                <div class="modal-header">
                  <h5 class="modal-title" id="deviceModalLabel">Add Device</h5>
                  <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                  <form id="deviceForm">
                    <input class="form-control mb-2" name="ip" placeholder="IP Address" required>
                    <input class="form-control mb-2" name="username" placeholder="Username" required>
                    <input class="form-control mb-2" name="password" placeholder="Password" type="password" required>
                              <!-- Platform dropdown -->
                    <select class="form-control mb-2 selectpicker" name="platform" data-live-search="true" required>
                      <option value="" disabled selected>Select Platform</option>
                      <option value="fortinet">Fortinet FortiOS</option>
                      <option value="paloalto_panos">Palo Alto PAN-OS</option>
                      <option value="cisco_ios">Cisco IOS</option>
                      <option value="cisco_nxos">Cisco NX-OS</option>
                      <option value="cisco_xe">Cisco IOS-XE</option>
                      <option value="cisco_xr">Cisco IOS-XR</option>
                      <option value="juniper_junos">Juniper JunOS</option>
                      <option value="arista_eos">Arista EOS</option>
                      <option value="aruba_aoscx">Aruba AOS-CX</option>
                      <option value="checkpoint_gaia">Checkpoint GAiA</option>
                      <option value="hp_procurve">HP ProCurve</option>
                      <option value="hp_comware">HP Comware</option>
                    </select>

                    <input class="form-control mb-2" name="secret" placeholder="Secret">
                    <input class="form-control mb-2" name="port" placeholder="Port" type="number" value="22" required>
                  </form>
                  <div id="deviceError" class="text-danger"></div>
                </div>
                <div class="modal-footer">
                  <button class="btn btn-primary" id="saveDeviceBtn">Save Device</button>
                </div>
              </div>
            </div>
          </div>

          <!-- This is where added devices will show up -->
          <div id="deviceList" class="mt-3"></div>
        </div>
      </div>
    </div>

<!-- Commands Section -->
<div class="accordion-item">
  <h2 class="accordion-header" id="headingCommands">
    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
            data-bs-target="#collapseCommands">
      Commands
    </button>
  </h2>
  <div id="collapseCommands" class="accordion-collapse collapse" data-bs-parent="#setupAccordion">
    <div class="accordion-body">

      <label class="form-label">Upload Commands TXT</label>

      <!-- File input (hidden but styled like Devices) -->
      <input id="commandsFileInput" class="form-control mb-3" type="file" name="commands_file" accept=".txt">

      <!-- Custom upload button -->
      <button class="btn btn-primary" type="button" onclick="document.getElementById('commandsFileInput').click()">
        Upload TXT
      </button>

      <!-- File name display -->
      <small id="commandsFileName" class="text-muted d-block mt-2"></small>

      <script>
        const commandsInput = document.getElementById("commandsFileInput");
        const commandsFileNameDisplay = document.getElementById("commandsFileName");

        commandsInput.addEventListener("change", (event) => {
          const file = event.target.files[0];
          if (file) {
            commandsFileNameDisplay.textContent = "Selected: " + file.name;
          } else {
            commandsFileNameDisplay.textContent = "";
          }
        });
      </script>

      <hr>
      <label class="form-label">Or type commands manually</label>
      <textarea class="form-control" name="manual_commands" rows="5" placeholder="Enter one command per line"></textarea>
    </div>
  </div>
</div>

    <!-- General Options -->
    <div class="accordion-item">
      <h2 class="accordion-header" id="headingOptions">
        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                data-bs-target="#collapseOptions">
          General Options
        </button>
      </h2>
      <div id="collapseOptions" class="accordion-collapse collapse" data-bs-parent="#setupAccordion">
        <div class="accordion-body">
          <!-- Just the checkboxes -->
          <div class="form-check d-flex justify-content-center align-items-center mb-2">
            <input class="form-check-input me-2" type="checkbox" name="verbose" id="verbose">
            <label class="form-check-label" for="verbose">Verbose Output</label>
          </div>

          <div class="form-check d-flex justify-content-center align-items-center mb-2">
            <input class="form-check-input me-2" type="checkbox" name="verify" id="verify">
            <label class="form-check-label" for="verify">Verify Configuration</label>
          </div>
        </div>
      </div>
    </div>
  </div> <!-- ✅ close accordion -->

  <!-- 🚀 Start Rollout button outside accordion -->
  <div class="d-flex justify-content-center mt-4">
    <button class="btn btn-success" type="submit">🚀 Start Rollout</button>
  </div>
</form>
{% endblock %}
