<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{% block title %}Network Rollout Tool{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Select CSS -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-select@1.14.0-beta3/dist/css/bootstrap-select.min.css">

    <style>
        body {
            transition: background-color 0.3s, color 0.3s;
        }

        .dark-mode {
            background-color: #121212 !important;
            color: #e0e0e0 !important;
        }

        .dark-mode .lead,
        .dark-mode p,
        .dark-mode h1,
        .dark-mode h2 {
            color: #e0e0e0 !important;
        }

        .btn-primary {
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        .dark-mode .btn-primary {
            background-color: #00bcd4 !important;
            border-color: #00bcd4 !important;
            color: #121212 !important;
            box-shadow: 0 0 10px rgba(0, 188, 212, 0.7);
        }

        .dark-mode .btn-primary:hover {
            background-color: #00e5ff !important;
            border-color: #00e5ff !important;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.9);
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: #6c757d;
        }

        .dark-mode .footer {
            color: #aaa;
        }

        .dark-mode .alert-info {
            background-color: #1e3a5f !important;
            color: #cce4ff !important;
            border-color: #335a8a !important;
        }
    </style>
</head>
<body class="bg-light text-center p-4">
<div class="container">
    {% if request.path != '/' %}
    <div class="d-flex justify-content-start mb-3">
        <a href="{{ url_for('home') }}" class="btn btn-outline-primary">
            🏠 Back to Home
        </a>
    </div>
    {% endif %}
    {% block content %}{% endblock %}

    <button id="darkModeToggle" class="btn btn-secondary mt-3">🌙 Dark Mode
    </button>

    <div class="footer mt-4">
        Created by Itamar Weinstein | ICTBIT Solutions — © 2025
    </div>
</div>

<script>
    const toggle = document.getElementById("darkModeToggle");
    const body = document.body;

    if (localStorage.getItem("darkMode") === "enabled") {
        body.classList.add("dark-mode");
        toggle.textContent = "☀️ Light Mode";
    }

    toggle.addEventListener("click", () => {
        body.classList.toggle("dark-mode");
        if (body.classList.contains("dark-mode")) {
            localStorage.setItem("darkMode", "enabled");
            toggle.textContent = "☀️ Light Mode";
        } else {
            localStorage.setItem("darkMode", "disabled");
            toggle.textContent = "🌙 Dark Mode";
        }
    });
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<!-- jQuery (required for bootstrap-select) -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<!-- Bootstrap Select JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap-select@1.14.0-beta3/dist/js/bootstrap-select.min.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        $('.selectpicker').selectpicker();
    });
</script>
</body>
</html>
