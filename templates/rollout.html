{% extends "base.html" %}
{% block title %}Live Rollout - Network Rollout Tool{% endblock %}

{% block home_button %}
<button id="homeBtn" class="btn btn-outline-primary" disabled>
    🏠 Back to Home
</button>
<script>
    const homeBtn = document.getElementById("homeBtn");

    function checkStatus() {
        fetch("/rollout_status")
            .then(res => res.json())
            .then(data => {
                homeBtn.disabled = (data.status === "active");
            });
    }

    checkStatus();
    setInterval(checkStatus, 2000);

    homeBtn.addEventListener("click", () => {
        if (!homeBtn.disabled) {
            window.location.href = "/";
        } else {
            alert("A rollout is still in progress. Cancel first to return home.");
        }
    });
</script>
{% endblock %}

{% block content %}
<h2 class="mb-4 text-center">🚀 Rollout in Progress</h2>

<!-- Log window -->
<div id="logWindow" class="bg-dark text-light p-3 rounded"
     style="height: 400px; overflow-y: auto; font-family: monospace; white-space: pre-wrap; border: 1px solid #444;">
    <em>Waiting for logs...</em>
</div>

<!-- Cancel button (optional) -->
<div class="d-flex justify-content-center mt-3">
    <button id="cancelBtn" class="btn btn-danger">❌ Cancel Rollout</button>
</div>
<script>
    document.getElementById("cancelBtn").addEventListener("click", () => {
        if (confirm("Are you sure you want to cancel the rollout? " +
            "This action may leave some devices with partial configuration")) {
            fetch("/cancel_rollout", {method: "POST"})
                .then(res => res.json())
                .then(data => {
                    if (data.status === "canceled") {
                        alert("Rollout canceled.");
                    } else {
                        alert("No rollout is currently running.");
                    }
                });
        }
    });
</script>

<script>
    // Connect to SSE endpoint
    const logWindow = document.getElementById("logWindow");

    const eventSource = new EventSource("/rollout_stream");

    let rolloutActive = true;

    // Watch SSE message to know when it's safe to close
    eventSource.onmessage = function (event) {
        const newLine = document.createElement("div");
        newLine.innerHTML = event.data;  // already contains colored <span>
        logWindow.appendChild(newLine);
        logWindow.scrollTop = logWindow.scrollHeight; // auto scroll


        // ✅ Close SSE when rollout finishes or cancels
        if (event.data.includes("Rollout Canceled By User") ||
            event.data.includes("Configuration rollout complete") ||
            event.data.includes("Please see Execution logs") ||
            event.data.includes("Rollout failed")) {
            rolloutActive = false;
            eventSource.close();
            console.log("SSE connection closed by client.");
        }
    };

    // 🚨 Warn user if leaving mid-rollout
window.addEventListener("beforeunload", function (e) {
    if (rolloutActive) {
        e.preventDefault();
        //Required for Chrome,Firefox,Safari
        // noinspection JSDeprecatedSymbols
        e.returnValue = "";
    }
});

    eventSource.onerror = function () {
        const newLine = document.createElement("div");
        newLine.innerHTML = "<span style='color:red;'>⚠️ Connection lost.</span>";
        logWindow.appendChild(newLine);
        eventSource.close();
    };
</script>
{% endblock %}
